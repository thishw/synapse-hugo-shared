{{ define "main" }}
<h1>{{ .Title }}</h1>
<p class="taxonomy-desc">카테고리별로 글을 모아볼 수 있습니다.</p>
<ul class="taxonomy-list">
  {{ range .Data.Terms.Alphabetical }}
  <li class="taxonomy-item">
    <a class="taxonomy-link" href="{{ .Page.Permalink }}">
      <span class="taxonomy-name">{{ .Page.Title }}</span>
      <span class="taxonomy-count">{{ .Count }}편</span>
    </a>
  </li>
  {{ else }}
  <li class="taxonomy-empty">아직 카테고리가 없습니다.</li>
  {{ end }}
</ul>
{{ end }}

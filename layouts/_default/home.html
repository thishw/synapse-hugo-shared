{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul>
  {{ range (where .Site.RegularPages "Section" "posts") }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
